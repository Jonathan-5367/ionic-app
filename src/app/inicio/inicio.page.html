<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Inicio</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar color="primary">
      <ion-title size="large">Inicio</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="ion-text-center" style="margin-bottom: 24px;">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d1/Ionic_Logo.svg" alt="Ionic Logo" style="height: 60px; margin: 0 16px; vertical-align: middle;">
    <img src="https://angular.io/assets/images/logos/angular/angular.svg" alt="Angular Logo" style="height: 60px; margin: 0 16px; vertical-align: middle;">
  </div>

  <div class="ion-text-center">
    <h2>Bienvenido a mi aplicación con IONIC/ANGULAR</h2>
    <p>Esta es la página de inicio. Usa el menú lateral para navegar a otras secciones.</p>
    <ion-button routerLink="/info-personal" color="secondary">Ir a mi información</ion-button>
  </div>
</ion-content>
