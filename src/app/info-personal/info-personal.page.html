<ion-header [translucent]="true">
  <ion-toolbar color="secondary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Información Personal</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar color="secondary">
      <ion-title size="large">Información Personal</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Mi Perfil</ion-card-title>
      <ion-card-subtitle>Datos de usuario</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <ion-list lines="none">
        <ion-item>
          <ion-icon name="person-circle" slot="start" color="primary"></ion-icon>
          <ion-label>
            <h3>Nombre</h3>
            <p>Jonathan Alvarado</p>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-icon name="mail" slot="start" color="primary"></ion-icon>
          <ion-label>
            <h3>Correo Electrónico</h3>
            <p>jonathan.alvarado&#64;example.com</p>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-icon name="call" slot="start" color="primary"></ion-icon>
          <ion-label>
            <h3>Teléfono</h3>
            <p>+1 234 567 8900</p>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-icon name="location" slot="start" color="primary"></ion-icon>
          <ion-label>
            <h3>Ubicación</h3>
            <p>Venezuela, Caracas</p>
          </ion-label>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>
</ion-content>
