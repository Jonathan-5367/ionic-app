<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Registro</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Crear Cuenta</h1>
        <p>Únete a nosotros hoy mismo</p>
      </div>

      <form [formGroup]="registroForm" (ngSubmit)="onSubmit()">
        <ion-list lines="none">
          <div class="input-group">
            <ion-item class="custom-input">
              <ion-icon name="person-outline" slot="start"></ion-icon>
              <ion-input formControlName="nombre" type="text" placeholder="Tu nombre"></ion-input>
            </ion-item>
            <div class="error-container">
              <ion-text color="danger" *ngIf="registroForm.get('nombre')?.invalid && registroForm.get('nombre')?.touched">
                <p class="error-message">Mínimo 3 caracteres.</p>
              </ion-text>
            </div>
          </div>

          <div class="input-group">
            <ion-item class="custom-input">
              <ion-icon name="mail-outline" slot="start"></ion-icon>
              <ion-input formControlName="correo" type="email" placeholder="Correo electrónico"></ion-input>
            </ion-item>
            <div class="error-container">
              <ion-text color="danger" *ngIf="registroForm.get('correo')?.invalid && registroForm.get('correo')?.touched">
                <p class="error-message">Correo inválido.</p>
              </ion-text>
            </div>
          </div>

          <div class="input-group">
            <ion-item class="custom-input">
              <ion-icon name="call-outline" slot="start"></ion-icon>
              <ion-input formControlName="telefono" type="tel" placeholder="Número de teléfono"></ion-input>
            </ion-item>
            <div class="error-container">
              <ion-text color="danger" *ngIf="registroForm.get('telefono')?.invalid && registroForm.get('telefono')?.touched">
                <p class="error-message">Teléfono inválido (solo números).</p>
              </ion-text>
            </div>
          </div>

          <div class="input-group">
            <ion-item class="custom-input">
              <ion-icon name="calendar-outline" slot="start"></ion-icon>
              <ion-input formControlName="fechaNacimiento" type="date" placeholder="Fecha de nacimiento"></ion-input>
            </ion-item>
            <div class="error-container">
              <ion-text color="danger" *ngIf="registroForm.get('fechaNacimiento')?.invalid && registroForm.get('fechaNacimiento')?.touched">
                <p class="error-message">La fecha es obligatoria.</p>
              </ion-text>
            </div>
          </div>

          <div class="input-group">
            <ion-item class="custom-input">
              <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
              <ion-input formControlName="password" type="password" placeholder="Contraseña"></ion-input>
            </ion-item>
            <div class="error-container">
              <ion-text color="danger" *ngIf="registroForm.get('password')?.invalid && registroForm.get('password')?.touched">
                <p class="error-message">Mínimo 6 caracteres.</p>
              </ion-text>
            </div>
          </div>

          <div class="input-group">
            <ion-item class="custom-input">
              <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
              <ion-input formControlName="confirmPassword" type="password" placeholder="Repetir contraseña"></ion-input>
            </ion-item>
            <div class="error-container">
              <ion-text color="danger" *ngIf="registroForm.get('confirmPassword')?.hasError('passwordMismatch') && registroForm.get('confirmPassword')?.touched">
                <p class="error-message">Las contraseñas no coinciden.</p>
              </ion-text>
            </div>
          </div>
        </ion-list>

        <ion-button expand="block" type="submit" class="auth-button" shape="round" [disabled]="registroForm.invalid">
          Registrarse
        </ion-button>

        <div style="text-align: center; margin-top: 15px;">
          <a routerLink="/login" style="color: #667eea; text-decoration: none; font-size: 14px; font-weight: 600;">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
      </form>
    </div>
  </div>
</ion-content>
