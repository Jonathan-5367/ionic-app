<ion-header [translucent]="true">
  <ion-toolbar class="transparent-toolbar">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Contactos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="glass-page ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar class="transparent-toolbar">
      <ion-title size="large">Contactos</ion-title>
    </ion-toolbar>
  </ion-header>

  <div style="display: flex; justify-content: center; margin-top: 10px;">
    <div class="glass-card" style="width: 100%; max-width: 600px; padding: 20px;">
      <ion-list class="transparent-list" lines="none">
        <ion-item style="--background: rgba(255,255,255,0.4); --border-radius: 15px; margin-bottom: 15px;">
          <ion-avatar slot="start">
            <img alt="Silhouette of a person's head" src="https://ionicframework.com/docs/img/demos/avatar.svg" />
          </ion-avatar>
          <ion-label>
            <h2 style="font-weight: 700; color: #333;">María García</h2>
            <p style="color: #667eea; font-weight: 600;">Compañera de trabajo</p>
            <ion-text style="color: #666; font-size: 13px;" class="telefono">📞 555-123-4567</ion-text>
          </ion-label>
        </ion-item>
        
        <ion-item style="--background: rgba(255,255,255,0.4); --border-radius: 15px; margin-bottom: 15px;">
          <ion-avatar slot="start">
            <img alt="Silhouette of a person's head" src="https://ionicframework.com/docs/img/demos/avatar.svg" />
          </ion-avatar>
          <ion-label>
            <h2 style="font-weight: 700; color: #333;">Carlos López</h2>
            <p style="color: #667eea; font-weight: 600;">Amigo</p>
            <ion-text style="color: #666; font-size: 13px;" class="telefono">📞 555-987-6543</ion-text>
          </ion-label>
        </ion-item>

        <ion-item style="--background: rgba(255,255,255,0.4); --border-radius: 15px; margin-bottom: 15px;">
          <ion-avatar slot="start">
            <img alt="Silhouette of a person's head" src="https://ionicframework.com/docs/img/demos/avatar.svg" />
          </ion-avatar>
          <ion-label>
            <h2 style="font-weight: 700; color: #333;">Ana Martínez</h2>
            <p style="color: #667eea; font-weight: 600;">Familiar</p>
            <ion-text style="color: #666; font-size: 13px;" class="telefono">📞 555-555-0000</ion-text>
          </ion-label>
        </ion-item>
      </ion-list>
    </div>
  </div>
</ion-content>
